name: WarrantyTracker
options:
  bundleIdPrefix: com.shimondeitel.warrantytrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WarrantyTracker:
    type: application
    platform: iOS
    sources:
      - path: WarrantyTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warrantytrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WarrantyTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WarrantyTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WarrantyTrackerTests
      - path: WarrantyTracker.storekit
    dependencies:
      - target: WarrantyTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warrantytrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WarrantyTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WarrantyTrackerUITests
    dependencies:
      - target: WarrantyTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warrantytrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WarrantyTracker:
    build:
      targets:
        WarrantyTracker: all
        WarrantyTrackerTests: [test]
        WarrantyTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WarrantyTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: WarrantyTracker.storekit
      targets:
        - WarrantyTrackerTests
        - WarrantyTrackerUITests
    archive:
      config: Release
